<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼贴创意 · 拼贴风格海报提示词生成器 - 古月AI智能体</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Microsoft YaHei",sans-serif;
}

body{

background:
linear-gradient(120deg,#0f172a,#1e293b,#111827,#020617);

min-height:100vh;
padding:60px;
color:#fff;

}

/* 拼贴背景装饰 */

body::before{

content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:
radial-gradient(circle at 20% 20%,rgba(255,0,150,0.25),transparent 40%),
radial-gradient(circle at 80% 30%,rgba(0,200,255,0.25),transparent 40%),
radial-gradient(circle at 40% 80%,rgba(255,200,0,0.2),transparent 40%);

z-index:-1;

}

/* 页面容器 */

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
font-size:36px;
margin-bottom:50px;
background:linear-gradient(90deg,#f472b6,#22d3ee,#facc15);
-webkit-background-clip:text;
color:transparent;
}

/* 输入卡片 */

.card{

background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);

padding:30px;

border-radius:20px;

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 10px 40px rgba(0,0,0,0.5);

margin-bottom:30px;

}

/* 输入框 */

label{
font-size:14px;
opacity:0.8;
}

input{

width:100%;
padding:14px;
margin-top:8px;
margin-bottom:18px;

border-radius:10px;
border:none;

background:rgba(255,255,255,0.1);

color:#fff;

font-size:15px;

}

/* 按钮 */

button{

padding:14px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;

background:linear-gradient(90deg,#f472b6,#22d3ee);

color:#fff;

transition:0.3s;

}

button:hover{

transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);

}

.generate{
width:100%;
}

/* 结果网格 */

.results{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(450px,1fr));

gap:22px;

margin-top:40px;

}

/* 提示词卡片 */

.promptCard{

background:

linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));

border-radius:18px;

padding:24px;

border:1px solid rgba(255,255,255,0.15);

box-shadow:0 8px 25px rgba(0,0,0,0.6);

transition:0.3s;

}

.promptCard:hover{

transform:translateY(-4px);

}

.promptTitle{

font-size:18px;
font-weight:700;
margin-bottom:10px;

color:#22d3ee;

}

.promptText{

white-space:pre-wrap;

line-height:1.7;

font-size:14px;

opacity:0.9;

}

/* 复制按钮 */

.copyBtn{

margin-top:14px;

background:linear-gradient(90deg,#f472b6,#facc15);

padding:8px 16px;

border-radius:8px;

border:none;

cursor:pointer;

font-size:14px;

color:#000;

}

.copyBtn.copied{

background:#22c55e;
color:#fff;

}

</style>
</head>

<body>

<div class="container">

<h1>拼贴创意 · 拼贴风格海报提示词生成器 - 古月AI智能体</h1>

<div class="card">

<label>海报主题</label>
<input id="title" placeholder="例如：潮流艺术节">

<label>海报副标题</label>
<input id="subtitle" placeholder="例如：年轻人的创意派对">

<label>海报类型</label>
<input id="type" placeholder="例如：品牌活动 / 音乐节 / 艺术展">

<button class="generate" onclick="generate()">生成20组提示词</button>

</div>

<div id="results" class="results"></div>

</div>

<script>

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* 辅助文字 */

let assistTexts=[

"新品上线","限时活动","潮流推荐","艺术展览","创意发布",
"独家企划","年度活动","潮流派对","品牌联名","创意展演",
"限定系列","特别企划","艺术体验","视觉盛宴","设计发布",
"创意市集","文化创意","灵感计划"

];

/* 拼贴元素 */

let visuals=[

"人物照片与手绘图案叠加",
"潮流插画与产品摄影拼贴",
"纸张纹理与涂鸦元素组合",
"复古海报碎片拼接",
"几何图形与人物剪影叠加",
"照片碎片拼贴构图",
"艺术纹理与霓虹元素叠加",
"手写字体与照片拼贴",
"潮流贴纸元素拼接",
"漫画图案与品牌图标组合",
"拼贴剪影与摄影元素融合",
"手绘图形与照片纹理叠加",
"街头艺术贴纸拼贴",
"摄影图层叠加构图",
"艺术海报碎片重组"

];

/* 排版 */

let layouts=[

"主标题大字居中，副标题错位排列，辅助文字标签散落",
"主标题倾斜排版，副标题叠加图像，辅助文字小标签点缀",
"标题叠加照片图层，副标题横向排列",
"标题与视觉元素交错排列，辅助文字围绕排布",
"标题大字突出，副标题斜排增加拼贴感",
"标题覆盖视觉主体，副标题贴纸式排版",
"标题分层排版，副标题小字穿插",
"标题块状拼贴，副标题沿边缘排列"

];

function generate(){

let title=document.getElementById("title").value.trim();
let subtitle=document.getElementById("subtitle").value.trim();
let type=document.getElementById("type").value.trim();

if(!title){

alert("请输入海报主题");

return;

}

let container=document.getElementById("results");

container.innerHTML="";

for(let i=1;i<=20;i++){

let assist=rand(assistTexts);
let visual=rand(visuals);
let layout=rand(layouts);

let text=`主标题：${title}
副标题：${subtitle}
海报类型：${type || "拼贴风格创意海报"}

辅助文字：${assist}

核心视觉元素：${visual}

视觉表现手法：多层素材叠加、照片拼贴、纹理融合、色彩碰撞、剪影构图、蒙版叠加、透视变化、光影混合。

文字布局：${layout}

风格：拼贴风格设计，多元素混搭，视觉层次丰富，色彩大胆碰撞，创意组合突出，整体视觉冲击力强。`;

let card=document.createElement("div");

card.className="promptCard";

card.innerHTML=`

<div class="promptTitle">提示词 #${i}</div>

<div class="promptText">${text}</div>

<button class="copyBtn">复制提示词</button>

`;

let btn=card.querySelector("button");

btn.onclick=function(){

navigator.clipboard.writeText(text);

btn.innerText="已复制";

btn.classList.add("copied");

setTimeout(()=>{

btn.innerText="复制提示词";

btn.classList.remove("copied");

},3000);

};

container.appendChild(card);

}

}

</script>

</body>
</html>
